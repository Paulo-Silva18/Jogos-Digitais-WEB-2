<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <th:block th:replace="~{fragments/head :: head('Listar Pedidos')}"></th:block>
    <style>
        body { background-color: #1a1a2e; color: #e9ecef; }
        h1 { text-shadow: 2px 2px #00d4ff; font-weight: bold; }
        .table-dark-custom { background-color: #16213e; color: white; }
        .table-dark-custom th { background-color: #0f3460; border-color: #1a1a2e; }
        .table-dark-custom td { border-color: #1a1a2e; }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/header :: header()}"></th:block>

    <div class="container pt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Lista de Pedidos</h1>
            <a th:href="@{/order/create}" class="btn btn-primary">➕ Novo Pedido</a>
        </div>

        <table class="table table-striped table-hover table-dark-custom shadow-lg rounded">
            <thead>
                <tr>
                    <th scope="col">ID</th>
                    <th scope="col">Data do Pedido</th>
                    <th scope="col">Valor Total</th>
                    <th scope="col" class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${orders.isEmpty()}">
                    <td colspan="4" class="text-center align-middle">Nenhum pedido encontrado.</td>
                </tr>
                <tr th:each="order : ${orders}">
                    <td class="align-middle" th:text="${order.id}"></td>
                    <td class="align-middle" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="align-middle" th:text="'R$ ' + ${#numbers.formatDecimal(order.total, 1, 2)}"></td>
                    <td class="text-center align-middle">
                        <a th:href="@{/order/edit/{id}(id=${order.id})}" class="btn btn-sm btn-warning font-weight-bold text-dark">Editar</a>
                        <a th:href="@{/order/delete/{id}(id=${order.id})}" class="btn btn-sm btn-danger font-weight-bold" 
                           onclick="return confirm('Tem certeza que deseja excluir este pedido?');">Deletar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <th:block th:replace="~{fragments/footer :: footer()}"></th:block>
</body>
</html>
