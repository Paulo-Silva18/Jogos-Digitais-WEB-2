<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Importa o head padrão -->
    <th:block th:replace="~{fragments/head :: head('Cadastro de Usuário')}"></th:block>
    
    <!-- Estilos exclusivos desta página mantendo a identidade da loja -->
    <style>
        body { background-color: #1a1a2e; color: #e9ecef; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control { background-color: #0f3460; border: none; color: white; }
        .form-control:focus { background-color: #1a1a2e; color: #00d4ff; border: 1px solid #00d4ff; }
        label { font-weight: bold; color: #00d4ff; }
        h1 { text-shadow: 2px 2px #00d4ff; } 
        .btn-game { background-color: #00d4ff; border: none; color: #1a1a2e; font-weight: bold; transition: 0.3s; }
        .btn-game:hover { background-color: #00a8cc; transform: scale(1.05); color: white;}
        .form-check-label { color: #e9ecef; font-weight: normal; }
    </style>
</head>
<body>
    <!-- Menu de Navegação -->
    <th:block th:replace="~{fragments/header :: header()}"></th:block>

    <div class="container mt-5 mb-5 d-flex justify-content-center">
        <div class="card p-5 shadow-lg" style="width: 100%; max-width: 600px;">
            <h1 class="mb-4 text-center">👤 Registrar Usuário</h1>

            <!-- Alerta de Sucesso/Erro (Aparece apenas se a variável msg existir) -->
            <div th:if="${msg != null}" class="alert alert-info text-center font-weight-bold" th:text="${msg}"></div>

            <form th:action="@{/saveUser}" method="POST">
                
                <!-- Token CSRF de Segurança do Spring Security -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group mb-3">
                    <label for="name">Nome</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Nome completo do usuário" required>
                </div>

                <div class="form-group mb-3">
                    <label for="email">E-mail</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="usuario@email.com" required>
                </div>

                <div class="form-group mb-4">
                    <label for="password">Senha</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Digite uma senha forte" required>
                </div>

                <div class="form-group mb-4">
                    <label class="mb-2 d-block">Níveis de Acesso (Roles):</label>
                    
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="roles" id="roleAdmin" value="Admin">
                        <label class="form-check-label" for="roleAdmin">Admin</label>
                    </div>
                    
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="roles" id="roleManager" value="Manager">
                        <label class="form-check-label" for="roleManager">Gerente</label>
                    </div>
                    
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="roles" id="roleHR" value="HR">
                        <label class="form-check-label" for="roleHR">RH</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" name="roles" id="roleEmployee" value="Employee">
                        <label class="form-check-label" for="roleEmployee">Funcionário</label>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <button type="submit" class="btn btn-game px-5 w-100">Criar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Rodapé -->
    <th:block th:replace="~{fragments/footer :: footer()}"></th:block>
</body>
</html>
