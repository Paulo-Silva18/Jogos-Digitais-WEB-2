<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <th:block th:replace="~{fragments/head :: head('Catálogo de Jogos')}"></th:block>
    
    <style>
        body { background-color: #1a1a2e; color: #e9ecef; }
        h1 { text-shadow: 2px 2px #00d4ff; font-weight: bold; }
        .table-dark-custom { background-color: #16213e; color: white; }
        .table-dark-custom th { background-color: #0f3460; border-color: #1a1a2e; }
        .table-dark-custom td { border-color: #1a1a2e; }
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/header :: header()}"></th:block>

    <div class="container pt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="mb-0">Catálogo de Jogos</h1>
            <a sec:authorize="hasAuthority('Admin')" th:href="@{/game/create}" class="btn btn-primary">➕ Cadastrar Novo Jogo</a>
        </div>
        
        <table class="table table-striped table-hover table-dark-custom shadow-lg rounded">
            <thead>
                <tr>
                    <th scope="col">Título</th>
                    <th scope="col">Descrição</th>
                    <th scope="col">Preço</th>
                    <th scope="col">Qtd. em Estoque</th>
                    <th sec:authorize="hasAuthority('Admin')" scope="col" class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${gamesList}">
                    <td class="align-middle" th:text="${game.title}"></td>
                    <td class="align-middle" th:text="${game.description}"></td>
                    <td class="align-middle" th:text="'R$ ' + ${#numbers.formatDecimal(game.price, 1, 2)}"></td>
                    <td class="align-middle" th:text="${game.stockQuantity}"></td>
                    
                    <td sec:authorize="hasAuthority('Admin')" class="text-center align-middle">
                        <a th:href="@{/game/edit/{id}(id=${game.id})}" class="btn btn-sm btn-warning font-weight-bold text-dark">Editar</a>
                        <a th:href="@{/game/delete/{id}(id=${game.id})}" class="btn btn-sm btn-danger font-weight-bold" onclick="return confirm('Tem certeza que deseja remover este jogo da loja?');">Deletar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <th:block th:replace="~{fragments/footer :: footer()}"></th:block>
</body>
</html>
