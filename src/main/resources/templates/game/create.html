<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('Cadastrar Jogo')}"></th:block>

    <style>
        body { background-color: #1a1a2e; color: #e9ecef; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control { background-color: #0f3460; border: none; color: white; }
        .form-control:focus { background-color: #1a1a2e; color: #00d4ff; border: 1px solid #00d4ff; }
        label { font-weight: bold; color: #00d4ff; }
        h1 { text-shadow: 2px 2px #00d4ff; } 
        .btn-game { background-color: #00d4ff; border: none; color: #1a1a2e; font-weight: bold; transition: 0.3s; }
        .btn-game:hover { background-color: #00a8cc; transform: scale(1.05); color: white;}
    </style>
</head>
<body>
    <th:block th:replace="~{fragments/header :: header()}"></th:block>

    <div class="container mt-5 mb-5">
        <div class="card p-4 shadow-lg">
            <h1 class="mb-4">➕ Cadastrar Novo Jogo</h1>

            <form action="#" th:action="@{/game/save}" th:object="${game}" method="POST">

                <div class="form-group row">
                    <label for="title" class="col-sm-2 col-form-label">Título</label>
                    <div class="col-sm-10">
                        <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Ex: God of War">
                        <p th:if="${#fields.hasErrors('title')}" th:errorclass="text-danger mt-1" th:errors="*{title}"></p>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-2 col-form-label" for="description">Descrição</label>
                    <div class="col-sm-10">
                        <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Breve descrição do jogo..."></textarea>
                        <p th:if="${#fields.hasErrors('description')}" th:errorclass="text-danger mt-1" th:errors="*{description}"></p>
                    </div>
                </div>

                <div class="form-group row">
                    <label class="col-sm-2 col-form-label" for="price">Preço (R$)</label>
                    <div class="col-sm-4">
                        <input type="number" th:field="*{price}" class="form-control" id="price" step="0.01" placeholder="Ex: 199.90">
                        <p th:if="${#fields.hasErrors('price')}" th:errorclass="text-danger mt-1" th:errors="*{price}"></p>
                    </div>

                    <label class="col-sm-2 col-form-label text-right" for="stockQuantity">Estoque</label>
                    <div class="col-sm-4">
                        <input type="number" th:field="*{stockQuantity}" class="form-control" id="stockQuantity" placeholder="Quantidade de cópias">
                        <p th:if="${#fields.hasErrors('stockQuantity')}" th:errorclass="text-danger mt-1" th:errors="*{stockQuantity}"></p>
                    </div>
                </div>

                <div class="mt-4 text-right">
                    <button type="submit" class="btn btn-game px-5">Salvar Jogo</button>
                </div>
            </form>
        </div>
    </div>

    <th:block th:replace="~{fragments/footer :: footer()}"></th:block>
</body>
</html>
