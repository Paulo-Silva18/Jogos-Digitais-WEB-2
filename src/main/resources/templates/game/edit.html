<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard - Editar Game</title>

    <link
        rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
        crossorigin="anonymous"
    />
    <style>
        body { background-color: #1a1a2e; color: #e9ecef; }
        .card { background-color: #16213e; border: 1px solid #0f3460; }
        .form-control { background-color: #0f3460; border: none; color: white; }
        .form-control:focus { background-color: #1a1a2e; color: #00d4ff; border: 1px solid #00d4ff; }
        label { font-weight: bold; color: #00d4ff; }
        h1 { text-shadow: 2px 2px #e94560; }
        .btn-game { background-color: #e94560; border: none; color: white; transition: 0.3s; }
        .btn-game:hover { background-color: #ff2e63; transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="card p-4 shadow-lg">
        <h1 class="mb-4">🎮 Editar Game</h1>
        
        <form action="#" th:action="@{/game/save}" th:object="${game}" method="POST">

            <input type="hidden" th:field="*{id}" />

            <div class="form-group row">
                <label for="title" class="col-sm-2 col-form-label">Título</label>
                <div class="col-sm-10">
                    <input type="text" th:field="*{title}" class="form-control" id="title" placeholder="Ex: Elden Ring">
                </div>
            </div>

            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="description">Descrição</label>
                <div class="col-sm-10">
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Sinopse do jogo..."></textarea>
                </div>
            </div>

            <div class="form-group row">
                <label class="col-sm-2 col-form-label" for="price">Preço (R$)</label>
                <div class="col-sm-4">
                    <input type="number" th:field="*{price}" class="form-control" id="price" step="0.01" placeholder="0.00">
                </div>

                <label class="col-sm-2 col-form-label text-right" for="stockQuantity">Estoque</label>
                <div class="col-sm-4">
                    <input type="number" th:field="*{stockQuantity}" class="form-control" id="stockQuantity" placeholder="Quantidade">
                </div>
            </div>

            <div class="mt-4 text-right">
                <button type="submit" class="btn btn-game px-5">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
